name: Notify on Push

on:
  push:
    branches:
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Push received
        run: |
          echo "✅ Code pushed to GitHub master branch."
          echo "🚀 Vercel auto-deploy is handled via the local git post-push hook."
          echo "📦 Repo: https://github.com/asiasif/mycut"
          echo "🌐 Live site: https://mycut-nine.vercel.app"
